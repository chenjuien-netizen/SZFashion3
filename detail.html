<!DOCTYPE html>
<html class="light" lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="theme-color" content="#f7f9fb" />
    <title>SZFASHION | Détail inventaire</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#4e5c71",
              "inverse-on-surface": "#9a9d9f",
              "on-secondary-fixed": "#324053",
              "background": "#f7f9fb",
              "tertiary-container": "#dad6f7",
              "surface-variant": "#d9e4ea",
              "on-surface-variant": "#566166",
              "on-tertiary-fixed": "#393751",
              "on-tertiary-container": "#4b4a65",
              "on-tertiary": "#fcf7ff",
              "surface-bright": "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "error-dim": "#4e0309",
              "primary-fixed-dim": "#ccd4ee",
              "surface-tint": "#565e74",
              "outline": "#717c82",
              "tertiary-fixed": "#dad6f7",
              "secondary-fixed-dim": "#c7d5ed",
              "primary-fixed": "#dae2fd",
              "primary-container": "#dae2fd",
              "tertiary-fixed-dim": "#ccc9e9",
              "inverse-surface": "#0b0f10",
              "on-background": "#2a3439",
              "on-surface": "#2a3439",
              "on-primary-fixed": "#373f54",
              "on-primary-fixed-variant": "#535b71",
              "tertiary": "#5e5c78",
              "surface-container-highest": "#d9e4ea",
              "secondary-container": "#d5e3fc",
              "surface-container": "#e8eff3",
              "surface": "#f7f9fb",
              "secondary-fixed": "#d5e3fc",
              "secondary": "#526074",
              "error-container": "#fe8983",
              "tertiary-dim": "#52506b",
              "on-secondary-container": "#455367",
              "on-error-container": "#752121",
              "inverse-primary": "#dae2fd",
              "surface-container-low": "#f0f4f7",
              "on-primary-container": "#4a5167",
              "surface-dim": "#cfdce3",
              "outline-variant": "#a9b4b9",
              "on-primary": "#f7f7ff",
              "surface-container-high": "#e1e9ee",
              "on-error": "#fff7f6",
              "on-secondary": "#f8f8ff",
              "secondary-dim": "#465468",
              "on-tertiary-fixed-variant": "#55536f",
              "primary-dim": "#4a5268",
              "error": "#9f403d",
              "primary": "#565e74"
            },
            fontFamily: {
              headline: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"]
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px"
            },
            boxShadow: {
              ledger: "0 1px 0 rgba(113, 124, 130, 0.12)"
            }
          }
        }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
        font-size: 18px;
      }

      html,
      body {
        height: 100%;
        min-height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        min-height: 100dvh;
        font-family: "Inter", sans-serif;
        background-color: #f7f9fb;
      }

      .inventory-scroll {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
    <script src="./app.js" defer></script>
  </head>
  <body class="h-[100dvh] max-h-[100dvh] overflow-hidden bg-background text-on-surface antialiased" data-page="detail">
    <div class="fixed inset-x-0 top-0 bottom-16 overflow-hidden bg-background" id="detailAppShell">
      <main class="flex h-full min-h-0 flex-col overflow-hidden">
        <div class="sticky top-0 z-40 shrink-0 bg-background">
          <header class="flex h-14 items-center justify-between border-b border-slate-200 bg-slate-50 px-4">
            <div class="flex min-w-0 items-center gap-3">
              <button aria-label="Retour" class="rounded-full p-1 text-slate-700 transition-colors duration-150 hover:bg-slate-100" id="detailBackButton" type="button">
                <span class="material-symbols-outlined">arrow_back</span>
              </button>
              <div class="min-w-0">
                <h1 class="truncate text-lg font-extrabold uppercase tracking-tight text-slate-900" id="detailReference">-</h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant" id="detailSubline">Fiche produit</p>
              </div>
            </div>
          </header>
        </div>

        <section class="inventory-scroll min-h-0 flex-1 overflow-y-auto overscroll-contain bg-surface px-4 py-4" id="detailScroll">
          <div class="mx-auto flex w-full max-w-3xl flex-col gap-4">
            <div class="hidden border border-error/20 bg-error-container/15 px-4 py-3 text-[12px] font-medium text-on-error-container" id="detailNotFoundBanner">
              Référence introuvable dans le stock courant.
            </div>

            <section class="border border-outline-variant/20 bg-surface-container-lowest p-4" id="detailMainSection">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Stock actuel</div>
                  <div class="mt-1 truncate text-2xl font-black tracking-tight text-on-surface" id="detailStockDisplay">-</div>
                </div>
                <div class="shrink-0 text-right text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant" id="detailStockState">-</div>
              </div>
              <div class="mt-3 grid gap-2 sm:grid-cols-2">
                <div class="border border-outline-variant/20 bg-surface-container-low px-3 py-2">
                  <div class="text-[9px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Entrepot</div>
                  <div class="mt-1 text-[12px] font-medium text-on-surface" id="detailWarehouse">-</div>
                </div>
                <div class="border border-outline-variant/20 bg-surface-container-low px-3 py-2">
                  <div class="text-[9px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Création</div>
                  <div class="mt-1 text-[12px] font-medium text-on-surface" id="detailCreatedAt">-</div>
                </div>
                <div class="border border-outline-variant/20 bg-surface-container-low px-3 py-2">
                  <div class="text-[9px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Dernier mouvement</div>
                  <div class="mt-1 text-[12px] font-medium text-on-surface" id="detailLastMovement">-</div>
                </div>
                <div class="border border-outline-variant/20 bg-surface-container-low px-3 py-2">
                  <div class="text-[9px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Résumé</div>
                  <div class="mt-1 text-[12px] font-medium text-on-surface" id="detailSummary">-</div>
                </div>
              </div>
            </section>

            <section class="border border-outline-variant/20 bg-surface-container-lowest p-4" id="detailRemarkSection">
              <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Remarque</div>
              <div class="mt-2 whitespace-pre-wrap text-[12px] leading-5 text-on-surface" id="detailRemark">-</div>
            </section>

            <section class="border border-outline-variant/20 bg-surface-container-lowest">
              <div class="border-b border-outline-variant/20 px-4 py-3">
                <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Historique récent</div>
              </div>
              <div class="flex flex-col gap-px bg-outline-variant/20" id="detailHistoryList"></div>
              <div class="hidden px-4 py-5 text-center" id="detailHistoryEmpty">
                <p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-on-surface-variant">Aucun historique</p>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <nav class="fixed inset-x-0 bottom-0 z-50 flex h-16 items-stretch justify-around border-t border-slate-200 bg-slate-50">
      <a class="flex flex-1 flex-col items-center justify-center px-2 py-1 text-slate-400" href="./index.html" id="navInventoryButton">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Inventaire</span>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center px-2 py-1 text-slate-400" href="./history.html" id="navHistoryButton">
        <span class="material-symbols-outlined">history</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Historique</span>
      </a>
    </nav>
  </body>
</html>
