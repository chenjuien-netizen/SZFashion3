<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SZFASHION | Détail inventaire</title>
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var ref = params.get("ref") || "";
        var target = "./index.html" + (ref ? "#detail/" + encodeURIComponent(ref) : "#inventory");
        window.location.replace(target);
      }());
    </script>
  </head>
  <body>
    <p>Redirection vers le détail… <a href="./index.html#inventory">Ouvrir l’application</a></p>
  </body>
</html>
