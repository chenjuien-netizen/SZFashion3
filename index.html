<!DOCTYPE html>
<html class="light" lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="theme-color" content="#f7f9fb" />
    <title>SZFASHION | Inventaire</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#4e5c71",
              "inverse-on-surface": "#9a9d9f",
              "on-secondary-fixed": "#324053",
              "background": "#f7f9fb",
              "tertiary-container": "#dad6f7",
              "surface-variant": "#d9e4ea",
              "on-surface-variant": "#566166",
              "on-tertiary-fixed": "#393751",
              "on-tertiary-container": "#4b4a65",
              "on-tertiary": "#fcf7ff",
              "surface-bright": "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "error-dim": "#4e0309",
              "primary-fixed-dim": "#ccd4ee",
              "surface-tint": "#565e74",
              "outline": "#717c82",
              "tertiary-fixed": "#dad6f7",
              "secondary-fixed-dim": "#c7d5ed",
              "primary-fixed": "#dae2fd",
              "primary-container": "#dae2fd",
              "tertiary-fixed-dim": "#ccc9e9",
              "inverse-surface": "#0b0f10",
              "on-background": "#2a3439",
              "on-surface": "#2a3439",
              "on-primary-fixed": "#373f54",
              "on-primary-fixed-variant": "#535b71",
              "tertiary": "#5e5c78",
              "surface-container-highest": "#d9e4ea",
              "secondary-container": "#d5e3fc",
              "surface-container": "#e8eff3",
              "surface": "#f7f9fb",
              "secondary-fixed": "#d5e3fc",
              "secondary": "#526074",
              "error-container": "#fe8983",
              "tertiary-dim": "#52506b",
              "on-secondary-container": "#455367",
              "on-error-container": "#752121",
              "inverse-primary": "#dae2fd",
              "surface-container-low": "#f0f4f7",
              "on-primary-container": "#4a5167",
              "surface-dim": "#cfdce3",
              "outline-variant": "#a9b4b9",
              "on-primary": "#f7f7ff",
              "surface-container-high": "#e1e9ee",
              "on-error": "#fff7f6",
              "on-secondary": "#f8f8ff",
              "secondary-dim": "#465468",
              "on-tertiary-fixed-variant": "#55536f",
              "primary-dim": "#4a5268",
              "error": "#9f403d",
              "primary": "#565e74"
            },
            fontFamily: {
              headline: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"]
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px"
            },
            boxShadow: {
              ledger: "0 1px 0 rgba(113, 124, 130, 0.12)"
            }
          }
        }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
        font-size: 18px;
      }

      html,
      body {
        height: 100%;
        min-height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        min-height: 100dvh;
        font-family: "Inter", sans-serif;
        background-color: #f7f9fb;
      }

      .inventory-scroll {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      @supports (-webkit-touch-callout: none) {
        @media (hover: none) and (pointer: coarse) {
          input,
          select {
            font-size: 16px !important;
          }

          #searchInput {
            line-height: 1.3;
          }
        }
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
    <script src="./app.js" defer></script>
  </head>
  <body class="h-[100dvh] max-h-[100dvh] overflow-hidden bg-background text-on-surface antialiased" data-page="inventory">
    <div class="fixed inset-x-0 top-0 bottom-16 overflow-hidden bg-background" id="inventoryAppShell">
      <main class="flex h-full min-h-0 flex-col overflow-hidden">
        <div class="sticky top-0 z-40 shrink-0 bg-background">
          <header class="flex h-14 items-center justify-between border-b border-slate-200 bg-slate-50 px-4">
            <div class="flex items-center gap-3">
              <div>
                <h1 class="text-lg font-extrabold uppercase tracking-tight text-slate-900">SZFASHION</h1>
              </div>
            </div>
            <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Inventaire</div>
          </header>

          <section class="border-b border-outline-variant/20 bg-surface-container-low px-3 py-1.5 shadow-ledger">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-on-surface-variant !text-[16px]">search</span>
              <input autocomplete="off" class="w-full border-none bg-transparent p-0 text-[10px] font-medium tracking-tight text-on-surface placeholder:text-outline focus:ring-0" id="searchInput" placeholder="RECHERCHE RÉFÉRENCE / STOCK..." type="search" />
            </div>
          </section>

          <section class="border-b border-outline-variant/30 bg-surface-container-high px-3 py-1.5">
            <div class="flex flex-wrap items-center justify-between gap-x-2 gap-y-1">
              <div class="flex min-w-0 flex-wrap items-center gap-1.5">
                <div class="flex items-center gap-1 border border-outline-variant/20 bg-surface-container-lowest px-1.5 py-0.5">
                  <span class="material-symbols-outlined !text-[11px] text-primary">calendar_today</span>
                  <span class="text-[8px] font-bold tracking-tight text-primary" id="summaryDate">--/--/----</span>
                </div>
                <div class="flex min-w-0 flex-wrap items-center gap-1 text-[8px] font-bold uppercase tracking-[0.16em] text-on-surface-variant">
                  <span id="summaryRefs">0 refs</span>
                  <span class="text-outline-variant/40">//</span>
                  <span id="summaryPositive">0 en stock</span>
                  <span class="text-outline-variant/40">//</span>
                  <span id="summaryZero">0 en rupture</span>
                  <span class="text-outline-variant/40">//</span>
                  <span id="summaryTotals">0 pcs</span>
                </div>
              </div>
              <div class="text-right text-[8px] font-bold uppercase tracking-[0.18em] text-on-surface-variant" id="summaryStatus">Pret</div>
            </div>
          </section>
        </div>

        <section class="inventory-scroll min-h-0 flex-1 overflow-y-auto overscroll-contain bg-outline-variant/20" id="inventoryScroll">
          <div class="bg-outline-variant/20" id="inventoryGrid"></div>
          <div class="hidden border-t border-outline-variant/20 bg-surface-container-lowest px-4 py-5 text-center" id="emptyState">
            <p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-on-surface-variant">Aucun resultat</p>
            <p class="mt-1 text-[12px] text-on-surface-variant">Ajuste la recherche pour afficher des references.</p>
          </div>
        </section>
      </main>
    </div>

    <nav class="fixed inset-x-0 bottom-0 z-50 flex h-16 items-stretch justify-around border-t border-slate-200 bg-slate-50">
      <button class="flex flex-1 flex-col items-center justify-center bg-slate-200 px-2 py-1 text-slate-900" id="navInventoryButton" type="button" aria-current="page">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Inventaire</span>
      </button>
      <a class="flex flex-1 flex-col items-center justify-center px-2 py-1 text-slate-400" href="./history.html" id="navHistoryButton">
        <span class="material-symbols-outlined">history</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Historique</span>
      </a>
    </nav>

    <div class="quick-edit-overlay fixed inset-0 z-[60] hidden items-center justify-center bg-on-background/35 px-3 py-6" id="quickEditOverlay" role="presentation">
      <div aria-modal="true" class="relative max-h-[calc(100dvh-2.5rem)] w-full max-w-3xl overflow-hidden border border-outline-variant/20 bg-surface-container-lowest shadow-[0_18px_48px_rgba(11,15,16,0.18)]" id="quickEditModal" role="dialog" aria-labelledby="quickEditReference">
        <div class="border-b border-outline-variant/20 px-4 py-3">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="truncate text-lg font-black tracking-tight text-on-surface" id="quickEditReference">-</div>
            </div>
            <div class="text-right">
              <div class="text-[0.625rem] font-bold uppercase tracking-[0.2em] text-on-surface-variant">STOCK ACTUEL</div>
              <div class="text-sm font-bold text-primary" id="quickEditStockDisplay">-</div>
            </div>
          </div>
        </div>
        <div class="border-b border-outline-variant/20 bg-surface-container-low px-4 py-2">
          <div class="grid grid-cols-2 gap-2">
            <button class="border border-outline-variant/30 px-2 py-2 text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant" id="quickEditTabQuickExit" type="button">Sortie rapide</button>
            <button class="border border-outline-variant/30 px-2 py-2 text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant" id="quickEditTabEdit" type="button">Modifier</button>
          </div>
        </div>
        <div class="quick-edit-body max-h-[calc(100dvh-12.5rem)] overflow-y-auto px-4 py-3" id="quickEditBody">
          <div class="space-y-4">
            <section id="quickExitPanel" class="space-y-3">
              <div class="rounded border border-outline-variant/20 bg-surface-container-low px-3 py-2">
                <div class="flex items-center justify-between gap-3">
                  <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Stock actuel</div>
                  <div class="text-[11px] font-semibold text-primary" id="quickExitCurrentStock">-</div>
                </div>
              </div>
              <div class="grid gap-3 sm:grid-cols-2">
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Mode sortie</span>
                  <select class="w-full border-outline-variant/30 bg-surface-container-low text-sm font-medium text-on-surface" id="quickExitMode">
                    <option value="boxes">Cartons</option>
                    <option value="fraction">Fraction</option>
                    <option value="packs">Paquets</option>
                  </select>
                </label>
                <label class="block" id="quickExitValueWrap">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Valeur</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickExitValue" inputmode="numeric" min="0" step="1" type="number" />
                </label>
                <label class="block sm:col-span-2" id="quickExitFractionWrap">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Fraction</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickExitFractionText" maxlength="10" placeholder="1/2" type="text" />
                </label>
              </div>
            </section>

            <form class="hidden space-y-3" id="quickEditForm" novalidate>
              <div class="grid gap-3 sm:grid-cols-2">
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">尾箱</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditTail" inputmode="numeric" min="0" step="1" type="number" />
                </label>
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">件/箱</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditUnitsPerBox" inputmode="numeric" min="0" step="1" type="number" />
                </label>
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">箱数</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditItemBoxes" inputmode="numeric" min="0" step="1" type="number" />
                </label>
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">符号</span>
                  <select class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditSign">
                    <option value="">vide</option>
                    <option value="+">+</option>
                    <option value="×">×</option>
                  </select>
                </label>
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Fraction</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditFractionText" maxlength="10" placeholder="1/2" type="text" />
                </label>
                <label class="block">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Signe paquet</span>
                  <select class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditPackNotationSign">
                    <option value="">vide</option>
                    <option value="+">+</option>
                    <option value="-">-</option>
                  </select>
                </label>
                <label class="block sm:col-span-2">
                  <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">Nombre paquets</span>
                  <input class="w-full border-outline-variant/30 bg-surface-container-low px-2 text-sm font-medium text-on-surface" id="quickEditPackNotationCount" inputmode="numeric" min="0" step="1" type="number" />
                </label>
              </div>
            </form>

            <label class="block">
              <span class="mb-1 block text-[10px] font-bold uppercase tracking-[0.18em] text-on-surface-variant">放位</span>
              <textarea class="min-h-[7rem] w-full border-outline-variant/30 bg-surface-container-low text-sm text-on-surface" id="quickEditRemark" maxlength="240" placeholder="放位"></textarea>
            </label>

            <p class="hidden rounded border border-error/20 bg-error-container/20 px-3 py-2 text-[11px] font-medium text-on-error-container" id="quickEditMessage"></p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 border-t border-outline-variant/20 bg-surface-container-low px-4 py-4" id="quickEditFooter">
          <button class="border border-outline-variant/30 py-3 text-[11px] font-bold uppercase tracking-[0.18em] text-on-surface-variant transition-colors duration-150 hover:bg-surface-container" id="quickEditCancel" type="button">ANNULER</button>
          <button class="bg-surface-tint py-3 text-[11px] font-bold uppercase tracking-[0.18em] text-on-primary transition-colors duration-150 hover:bg-primary-dim" id="quickEditSave" type="button">APPLIQUER</button>
        </div>
      </div>
    </div>
  </body>
</html>
