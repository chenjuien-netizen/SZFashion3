<!DOCTYPE html>
<html class="light" lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="theme-color" content="#f7f9fb" />
    <title>SZFASHION | Historique</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#4e5c71",
              "inverse-on-surface": "#9a9d9f",
              "on-secondary-fixed": "#324053",
              "background": "#f7f9fb",
              "tertiary-container": "#dad6f7",
              "surface-variant": "#d9e4ea",
              "on-surface-variant": "#566166",
              "on-tertiary-fixed": "#393751",
              "on-tertiary-container": "#4b4a65",
              "on-tertiary": "#fcf7ff",
              "surface-bright": "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "error-dim": "#4e0309",
              "primary-fixed-dim": "#ccd4ee",
              "surface-tint": "#565e74",
              "outline": "#717c82",
              "tertiary-fixed": "#dad6f7",
              "secondary-fixed-dim": "#c7d5ed",
              "primary-fixed": "#dae2fd",
              "primary-container": "#dae2fd",
              "tertiary-fixed-dim": "#ccc9e9",
              "inverse-surface": "#0b0f10",
              "on-background": "#2a3439",
              "on-surface": "#2a3439",
              "on-primary-fixed": "#373f54",
              "on-primary-fixed-variant": "#535b71",
              "tertiary": "#5e5c78",
              "surface-container-highest": "#d9e4ea",
              "secondary-container": "#d5e3fc",
              "surface-container": "#e8eff3",
              "surface": "#f7f9fb",
              "secondary-fixed": "#d5e3fc",
              "secondary": "#526074",
              "error-container": "#fe8983",
              "tertiary-dim": "#52506b",
              "on-secondary-container": "#455367",
              "on-error-container": "#752121",
              "inverse-primary": "#dae2fd",
              "surface-container-low": "#f0f4f7",
              "on-primary-container": "#4a5167",
              "surface-dim": "#cfdce3",
              "outline-variant": "#a9b4b9",
              "on-primary": "#f7f7ff",
              "surface-container-high": "#e1e9ee",
              "on-error": "#fff7f6",
              "on-secondary": "#f8f8ff",
              "secondary-dim": "#465468",
              "on-tertiary-fixed-variant": "#55536f",
              "primary-dim": "#4a5268",
              "error": "#9f403d",
              "primary": "#565e74"
            },
            fontFamily: {
              headline: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"]
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px"
            },
            boxShadow: {
              ledger: "0 1px 0 rgba(113, 124, 130, 0.12)"
            }
          }
        }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
        font-size: 18px;
      }

      html,
      body {
        height: 100%;
        min-height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        min-height: 100dvh;
        font-family: "Inter", sans-serif;
        background-color: #f7f9fb;
      }

      .inventory-scroll {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
    <script src="./app.js" defer></script>
  </head>
  <body class="h-[100dvh] max-h-[100dvh] overflow-hidden bg-background text-on-surface antialiased" data-page="history">
    <div class="fixed inset-x-0 top-0 bottom-16 overflow-hidden bg-background" id="historyAppShell">
      <main class="flex h-full min-h-0 flex-col overflow-hidden">
        <div class="sticky top-0 z-40 shrink-0 bg-background">
          <header class="flex h-14 items-center justify-between border-b border-slate-200 bg-slate-50 px-4">
            <div class="flex items-center gap-3">
              <div>
                <h1 class="text-lg font-extrabold uppercase tracking-tight text-slate-900">Historique</h1>
              </div>
            </div>
            <button aria-label="Rafraîchir" class="rounded-full p-1 text-slate-700 transition-colors duration-150 hover:bg-slate-100" id="historyRefreshButton" type="button">
              <span class="material-symbols-outlined">refresh</span>
            </button>
          </header>

          <section class="border-b border-outline-variant/20 bg-surface-container-low px-3 py-2 shadow-ledger">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-on-surface-variant !text-[16px]">search</span>
              <input autocomplete="off" class="w-full border-none bg-transparent p-0 text-[10px] font-medium tracking-tight text-on-surface placeholder:text-outline focus:ring-0" id="historySearchInput" placeholder="RECHERCHE RÉFÉRENCE / TYPE / REMARQUE..." type="search" />
            </div>
            <div class="mt-2 flex items-center gap-2">
              <label class="min-w-0 flex-1">
                <select class="w-full border-outline-variant/30 bg-surface-container-lowest text-[12px] font-medium text-on-surface" id="historyActionTypeFilter">
                  <option value="">Tous types</option>
                  <option value="entry">entrée</option>
                  <option value="exit">sortie</option>
                  <option value="adjustment">ajustement</option>
                </select>
              </label>
              <div class="shrink-0 text-[9px] font-bold uppercase tracking-[0.16em] text-on-surface-variant" id="historyStatus">Pret</div>
            </div>
          </section>
        </div>

        <section class="inventory-scroll min-h-0 flex-1 overflow-y-auto overscroll-contain bg-outline-variant/20" id="historyScroll">
          <div class="flex flex-col gap-px bg-outline-variant/20" id="historyList"></div>
          <div class="hidden border-t border-outline-variant/20 bg-surface-container-lowest px-4 py-5 text-center" id="historyEmptyState">
            <p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-on-surface-variant" id="historyEmptyTitle">Aucun historique</p>
            <p class="mt-1 text-[12px] text-on-surface-variant" id="historyEmptyMessage">Aucun mouvement à afficher.</p>
          </div>
        </section>
      </main>
    </div>

    <nav class="fixed inset-x-0 bottom-0 z-50 flex h-16 items-stretch justify-around border-t border-slate-200 bg-slate-50">
      <a class="flex flex-1 flex-col items-center justify-center px-2 py-1 text-slate-400" href="./index.html" id="navInventoryButton">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Inventaire</span>
      </a>
      <button class="flex flex-1 flex-col items-center justify-center bg-slate-200 px-2 py-1 text-slate-900" id="navHistoryButton" type="button" aria-current="page">
        <span class="material-symbols-outlined">history</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-widest">Historique</span>
      </button>
    </nav>
  </body>
</html>
