<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fb" />
    <title>SZFASHION | Historique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./app.js" defer></script>
  </head>
  <body data-page="history">
    <div class="app-screen">
      <div class="app-shell app-shell-history">
        <main class="app-main">
          <div class="app-top-stack">
            <header class="app-header">
              <div class="app-header-left">
                <a class="icon-button" href="./index.html" aria-label="Retour inventaire">
                  <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div>
                  <h1 class="app-title">Historique</h1>
                </div>
              </div>
              <div id="historySummary" class="header-status">-</div>
            </header>

            <section class="history-search-strip">
              <div class="search-row">
                <span class="material-symbols-outlined search-symbol">search</span>
                <input
                  id="historySearchInput"
                  class="search-input"
                  type="search"
                  autocomplete="off"
                  placeholder="RECHERCHE RÉFÉRENCE / TYPE / REMARQUE..."
                />
              </div>

              <div class="history-filter-row">
                <label class="history-filter-wrap">
                  <select id="historyActionTypeFilter" class="history-filter-select">
                    <option value="">Tous types</option>
                    <option value="modifier">modifier</option>
                    <option value="sortie_rapide">sortie_rapide</option>
                  </select>
                </label>
                <div id="historyStatus" class="history-inline-status">Pret</div>
              </div>
            </section>
          </div>

          <section id="historyScroll" class="content-scroll inventory-scroll">
            <div id="historyList" class="history-list" aria-live="polite"></div>
            <div id="historyEmptyState" class="empty-strip hidden">
              <p id="historyEmptyTitle" class="empty-title">Aucun historique</p>
              <p id="historyEmptyMessage" class="empty-message">Aucun mouvement à afficher.</p>
            </div>
          </section>
        </main>
      </div>

      <nav class="bottom-nav" aria-label="Navigation principale">
        <a class="bottom-nav-link" href="./index.html">
          <span class="material-symbols-outlined">inventory_2</span>
          <span class="bottom-nav-text">Inventaire</span>
        </a>
        <a class="bottom-nav-link is-active" href="./history.html" aria-current="page">
          <span class="material-symbols-outlined">history</span>
          <span class="bottom-nav-text">Historique</span>
        </a>
      </nav>
    </div>
  </body>
</html>
